<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0e1622" />
    <title>{{ page_title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    {% for css_url in dev_page_assets.css_urls %}
    <link rel="stylesheet" href="{{ css_url }}" />
    {% endfor %}
  </head>
  <body class="dev-page {{ body_class }}" data-dev-page="{{ page_id }}">
    <main class="dev-page__main">
      <nav class="dev-page-nav" aria-label="Sandbox navigation">
        <a
          href="/__dev/auth-sandbox"
          class="dev-page-nav__link{% if page_id == 'auth-sandbox' %} dev-page-nav__link--active{% endif %}"
        >
          Authentication
        </a>
        <a
          href="/__dev/powersync-sandbox"
          class="dev-page-nav__link{% if page_id == 'powersync-sandbox' %} dev-page-nav__link--active{% endif %}"
        >
          PowerSync
        </a>
      </nav>

      {% block page_content %}{% endblock %}
    </main>

    <script>
      window.__PAPYRUS_DEV_PAGE_CONFIG__ = {{ page_config_json | safe }};
    </script>
    {% for script_url in dev_page_assets.script_urls %}
    <script type="module" src="{{ script_url }}"></script>
    {% endfor %}
  </body>
</html>
