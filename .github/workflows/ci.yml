name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: papyrus
          POSTGRES_PASSWORD: papyrus
          POSTGRES_DB: papyrus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: latest

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check .

      - name: Format
        run: uv run ruff format --check .

      - name: Type check
        run: uv run mypy papyrus/

      - name: Test
        run: uv run pytest --cov=papyrus --cov-report=term-missing
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://papyrus:papyrus@localhost:5432/papyrus_test
